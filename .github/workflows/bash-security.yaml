name: Secure DevOps - Practical Blacklist Security Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  blacklist-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Check Blacklist-based forbidden commands
        run: |
          echo "==== 🛡️ 블랙리스트 기반 위험 명령어 스캔 시작 ===="
          
          # 검사 대상 파일 (모든 .sh 파일을 타겟으로 지정)
          # find 명령어로 주석 제외한 순수 코드에서 패턴을 찾습니다.
          
          # [1] 시스템을 파괴, 수정, 유출할 수 있는 절대 금지 블랙리스트 키워드 정의
          # rm(삭제), chmod/chown(권한변경), wget/curl/nc(유출/다운로드), dd/mkfs(포맷), dd, tftp 등
          # \b는 단어의 시작과 끝을 의미합니다. (단어 격리)
          # 이를 통해 'perm' 안에 포함된 'm'이나 다른 글자가 chmod로 오탐되는 것을 방지합니다.
          BLACKLIST_KEYWORDS="\b(rm|chmod|chown|curl|wget|nc|dd|mkfs)\b"
          VIOLATION_FOUND=false

          # 모든 .sh 파일 내부를 검사 (주석 라인 `#` 은 제외)
          while read -r SCRIPT_PATH; do
            echo "🔍 스캔 중: $SCRIPT_PATH"
            
            # 블랙리스트 키워드가 감지되는지 확인
            if grep -E "$BLACKLIST_KEYWORDS" "$SCRIPT_PATH" | grep -v '^[[:space:]]*#'; then
              echo "❌ [Violation] $SCRIPT_PATH 에서 금지된 쓰기/위험 명령어가 감지되었습니다!"
              echo "👉 Violation:"
              grep -E "$BLACKLIST_KEYWORDS" "$SCRIPT_PATH" | grep -v '^[[:space:]]*#'
              VIOLATION_FOUND=true
            fi
          done < <(find . -name "*.sh" -not -path "*/.*")

          # [2] 최종 결과 처리
          if [ "$VIOLATION_FOUND" = true ]; then
            echo "--------------------------------------------------"
            echo "🚨 빌드 실패: 블랙리스트에 등록된 유해 코드가 존재합니다."
            exit 1
          else
            echo "--------------------------------------------------"
            echo "✅ 빌드 성공: 스크립트 내에 알려진 위험 명령어가 없습니다."
          fi
