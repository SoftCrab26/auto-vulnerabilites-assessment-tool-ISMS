name: Secure DevOps - Strict ReadOnly Whitelist Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  whitelist-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 화이트리스트 기반 Read-Only 명령어 검증
        run: |
          echo "==== 🛡️ 화이트리스트 기반 스크립트 무결성 검증 시작 ===="
          
          # 검사할 수집 스크립트 경로 (프로젝트에 맞게 수정)
          SCRIPT_PATH="scripts/linux.sh"
          
          # [1] 허용할 리드온리(조회용) 명령어 화이트리스트 정의 (파이프 '|' 로 구분)
          # 진단 스크립트에 필요한 안전한 명령어들을 여기에 계속 추가하세요.
          ALLOWED_COMMANDS="cat|grep|awk|sed|find|echo|ls|hostname|uname|id|cut|wc|uptime|free|df|ps"
          
          echo "👉 허용된 명령어 목록: [$ALLOWED_COMMANDS]"
          echo "--------------------------------------------------"
          
          VIOLATION_COUNT=0
          
          # [2] 스크립트에서 주석과 빈 줄을 제거하고, 순수 명령어 라인만 한 줄씩 읽기
          # 공백이나 특수문자로 시작하는 명령어도 잡기 위해 복합 파싱 수행
          sed -e 's/^[[:space:]]*//' "$SCRIPT_PATH" | grep -v '^[[:space:]]*#' | grep -v '^$' | while IFS= read -r line; do
            
            # 라인의 첫 번째 단어(명령어) 추출
            cmd=$(echo "$line" | awk '{print $1}' | tr -d '`$()";&|')
            
            # 파이프라인이나 서브쉘 내부의 명령어 처리를 위해 파싱 클리닝
            if [ -z "$cmd" ]; then continue; fi
            
            # 추출된 명령어가 화이트리스트에 매칭되는지 확인
            if ! echo "$cmd" | grep -Eq "^($ALLOWED_COMMANDS)$"; then
              echo "❌ [보안 위반] 허용되지 않은 명령어 발견: '$cmd' (라인: $line)"
              VIOLATION_COUNT=$((VIOLATION_COUNT + 1))
              # 서브쉘 밖으로 변수를 전달하기 위해 임시 파일 활용
              echo "fail" >> .scan_result
            fi
          done

          # [3] 최종 통과 여부 검증
          if [ -f .scan_result ]; then
            echo "--------------------------------------------------"
            echo "🚨 검증 실패: 허용되지 않은 쓰기(Write) 또는 위험 명령어가 감지되었습니다."
            rm -f .scan_result
            exit 1
          else
            echo "--------------------------------------------------"
            echo "✅ 검증 성공: 모든 코드가 허용된 Read-Only 명령어 범위 내에 존재합니다."
          fi
